name: Deploy to BIGVPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          PROJECT_NAME="pythonbotcollector"
          echo "Deploying $PROJECT_NAME..."

          tar czf /tmp/deploy.tar.gz --exclude='.git' --exclude='.github' --exclude='.env' .

          cat /tmp/deploy.tar.gz | ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "PROJECT_NAME=pythonbotcollector
             PROJECT_DIR=/opt/bigvps/projects/\$PROJECT_NAME
             mkdir -p \$PROJECT_DIR
             cd \$PROJECT_DIR
             rm -rf *
             tar xzf -
              echo 'BOT_TOKEN=${{ secrets.BOT_TOKEN }}' > .env
              echo 'ORGANIZER_ID=${{ secrets.ORGANIZER_ID }}' >> .env
              echo 'ORGANIZER_USERNAME=${{ secrets.ORGANIZER_USERNAME }}' >> .env
             docker compose down 2>/dev/null || true
             docker compose up -d --build --remove-orphans
             echo 'Deploy complete: \$PROJECT_NAME'"

      - name: Verify deploy
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker ps --filter name=pythonbotcollector --format '{{.Names}} {{.Status}}'"
