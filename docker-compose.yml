services:
  bot:
    build: .
    container_name: pythonbotcollector
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - botdata:/app/data
    networks:
      - pythonbotcollector
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  botdata:
    driver: local

networks:
  pythonbotcollector:
    driver: bridge
